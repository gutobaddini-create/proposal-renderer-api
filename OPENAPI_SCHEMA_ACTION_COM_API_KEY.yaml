openapi: 3.1.0
info:
  title: Proposal Renderer API
  description: API para gerar propostas jurídicas em PDF, Word visual e Word editável a partir de JSON estruturado.
  version: 0.1.0
security:
  - ApiKeyAuth: []
servers:
  - url: https://proposal-renderer-api.onrender.com
    description: API publicada em produção
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Verifica se a API renderizadora está ativa
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Serviço ativo
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: proposal-renderer-api
                  version:
                    type: string
                    example: 0.1.0
  /generate-proposal:
    post:
      operationId: generateProposal
      summary: Gera proposta jurídica em PDF e Word
      description: Recebe JSON estruturado de proposta e gera PDF visual, Word visual e Word editável.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposalRequest"
      responses:
        "200":
          description: Proposta gerada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  proposalId:
                    type: string
                    example: proposal_20260609_001
                  message:
                    type: string
                    example: Proposta gerada com sucesso.
                  files:
                    type: object
                    properties:
                      pdf:
                        type: string
                        example: https://proposal-renderer-api.onrender.com/files/proposal_20260609_001/proposta.pdf
                      visualDocx:
                        type: string
                        example: https://proposal-renderer-api.onrender.com/files/proposal_20260609_001/proposta_visual.docx
                      editableDocx:
                        type: string
                        example: https://proposal-renderer-api.onrender.com/files/proposal_20260609_001/proposta_editavel.docx
                  warnings:
                    type: array
                    items:
                      type: string
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: JSON inválido ou campos obrigatórios ausentes.
                  details:
                    type: object
                    additionalProperties: true
        "401":
          description: Não autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: API key inválida ou ausente.
components:
  schemas:
    OutputOptions:
      type: object
      required:
        - generatePdf
        - generateVisualDocx
        - generateEditableDocx
      properties:
        generatePdf:
          type: boolean
          example: true
        generateVisualDocx:
          type: boolean
          example: true
        generateEditableDocx:
          type: boolean
          example: true
      additionalProperties: true
    Provider:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: Lobo Baddini Advocacia
        area:
          type: string
          example: Direito do Trabalho Empresarial
        responsible:
          type: string
          example: Érica Lobo Baddini de Paula
        oab:
          type: string
          example: "[informar]"
        email:
          type: string
          example: advlobobaddini.erica@gmail.com
        phone:
          type: string
          example: 13 97402-9133
        instagram:
          type: string
          example: "@lobobaddini_advocacia"
        address:
          type: string
          example: Rua Major David Pereira nº 115, Conj. 2, Santa Cruz, Itapira/SP
      additionalProperties: true
    Client:
      type: object
      required:
        - name
      properties:
        type:
          type: string
          example: pj
        name:
          type: string
          example: Bovmeat Processadora de Carnes e Derivados
        document:
          type: string
          example: "[informar]"
        responsible:
          type: string
          example: "[informar]"
        responsibleRole:
          type: string
          example: "[informar]"
        email:
          type: string
          example: "[informar]"
        phone:
          type: string
          example: "[informar]"
        address:
          type: string
          example: "[informar]"
        city:
          type: string
          example: "[informar]"
      additionalProperties: true
    Investment:
      type: object
      required:
        - amountText
      properties:
        amountText:
          type: string
          example: Honorários mensais de R$ 3.500,00.
      additionalProperties: true
    Term:
      type: object
      required:
        - duration
      properties:
        duration:
          type: string
          example: Contrato inicial de 12 meses.
      additionalProperties: true
    Proposal:
      type: object
      required:
        - title
        - investment
        - term
      properties:
        templateId:
          type: string
          example: juridico_trabalhista_empresarial_preventivo
        title:
          type: string
          example: Proposta de Prestação de Serviços Jurídicos Trabalhistas
        subtitle:
          type: string
          example: Consultoria trabalhista mensal com foco preventivo e suporte ao RH
        objective:
          type: string
          example: Prestar assessoria jurídica trabalhista preventiva.
        investment:
          $ref: "#/components/schemas/Investment"
        term:
          $ref: "#/components/schemas/Term"
      additionalProperties: true
    LayoutSection:
      type: object
      properties:
        title:
          type: string
          example: Escopo de atuação
        content:
          description: Texto, lista ou objeto com conteúdo da seção.
      additionalProperties: true
    ProposalRequest:
      type: object
      required:
        - schema_version
        - document_type
        - output
        - provider
        - client
        - proposal
        - layoutPlan
      properties:
        schema_version:
          type: string
          example: proposal_renderer_v1
        document_type:
          type: string
          example: proposta_juridica
        metadata:
          type: object
          additionalProperties: true
        output:
          $ref: "#/components/schemas/OutputOptions"
        provider:
          $ref: "#/components/schemas/Provider"
        client:
          $ref: "#/components/schemas/Client"
        layoutPreferences:
          type: object
          additionalProperties: true
        proposal:
          $ref: "#/components/schemas/Proposal"
        layoutPlan:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/LayoutSection"
        pendingFields:
          type: array
          items:
            type: string
      additionalProperties: true
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
